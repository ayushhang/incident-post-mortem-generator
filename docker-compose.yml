version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: incident-postmortem-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: incident_postmortem
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - incident-postmortem

  # Redis
  redis:
    image: redis:7-alpine
    container_name: incident-postmortem-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - incident-postmortem

  # MinIO S3 (for local file storage)
  minio:
    image: minio/minio:latest
    container_name: incident-postmortem-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - incident-postmortem

  # MinIO Create Buckets
  minio-init:
    image: minio/mc:latest
    container_name: incident-postmortem-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/incident-postmortem;
      /usr/bin/mc policy set public myminio/incident-postmortem;
      exit 0;
      "
    networks:
      - incident-postmortem

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  incident-postmortem:
    driver: bridge
